<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1f2a3d"/>
    </linearGradient>
    <radialGradient id="bubble" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg4)"/>

  <!-- Bearing race annular slice (two arcs) -->
  <g fill="none" stroke="#5eead4" stroke-opacity="0.4" stroke-width="1.4">
    <path d="M80 250 Q400 80 720 250"/>
    <path d="M80 310 Q400 130 720 310"/>
  </g>

  <!-- Cavitation bubbles -->
  <g>
    <circle cx="200" cy="270" r="24" fill="url(#bubble)" stroke="#5eead4" stroke-opacity="0.55"/>
    <circle cx="260" cy="240" r="14" fill="url(#bubble)" stroke="#5eead4" stroke-opacity="0.55"/>
    <circle cx="320" cy="260" r="32" fill="url(#bubble)" stroke="#5eead4" stroke-opacity="0.55"/>
    <circle cx="380" cy="230" r="10" fill="url(#bubble)" stroke="#5eead4" stroke-opacity="0.55"/>
    <circle cx="430" cy="265" r="20" fill="url(#bubble)" stroke="#5eead4" stroke-opacity="0.55"/>
    <circle cx="490" cy="240" r="28" fill="url(#bubble)" stroke="#5eead4" stroke-opacity="0.55"/>
    <circle cx="560" cy="270" r="16" fill="url(#bubble)" stroke="#5eead4" stroke-opacity="0.55"/>
    <circle cx="620" cy="250" r="22" fill="url(#bubble)" stroke="#5eead4" stroke-opacity="0.55"/>
    <circle cx="170" cy="300" r="10" fill="url(#bubble)" stroke="#5eead4" stroke-opacity="0.55"/>
    <circle cx="290" cy="300" r="12" fill="url(#bubble)" stroke="#5eead4" stroke-opacity="0.55"/>
    <circle cx="600" cy="295" r="9" fill="url(#bubble)" stroke="#5eead4" stroke-opacity="0.55"/>
  </g>

  <text x="40" y="470" font-family="ui-monospace, monospace" font-size="14" fill="#5eead4" opacity="0.6">OpenFOAM · CFD · cavitation model</text>
</svg>
