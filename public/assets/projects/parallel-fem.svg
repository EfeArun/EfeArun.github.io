<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1f2a3d"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg2)"/>

  <!-- Four quadrant subdomains -->
  <g opacity="0.85">
    <rect x="150" y="80" width="240" height="160" fill="#5eead4" fill-opacity="0.10" stroke="#5eead4" stroke-opacity="0.6"/>
    <rect x="410" y="80" width="240" height="160" fill="#5eead4" fill-opacity="0.18" stroke="#5eead4" stroke-opacity="0.6"/>
    <rect x="150" y="260" width="240" height="160" fill="#5eead4" fill-opacity="0.22" stroke="#5eead4" stroke-opacity="0.6"/>
    <rect x="410" y="260" width="240" height="160" fill="#5eead4" fill-opacity="0.14" stroke="#5eead4" stroke-opacity="0.6"/>
  </g>

  <!-- Fine grid lines within -->
  <g stroke="#5eead4" stroke-opacity="0.25" stroke-width="0.7">
    <line x1="150" y1="120" x2="650" y2="120"/>
    <line x1="150" y1="160" x2="650" y2="160"/>
    <line x1="150" y1="200" x2="650" y2="200"/>
    <line x1="150" y1="300" x2="650" y2="300"/>
    <line x1="150" y1="340" x2="650" y2="340"/>
    <line x1="150" y1="380" x2="650" y2="380"/>
    <line x1="190" y1="80" x2="190" y2="420"/>
    <line x1="230" y1="80" x2="230" y2="420"/>
    <line x1="270" y1="80" x2="270" y2="420"/>
    <line x1="310" y1="80" x2="310" y2="420"/>
    <line x1="350" y1="80" x2="350" y2="420"/>
    <line x1="450" y1="80" x2="450" y2="420"/>
    <line x1="490" y1="80" x2="490" y2="420"/>
    <line x1="530" y1="80" x2="530" y2="420"/>
    <line x1="570" y1="80" x2="570" y2="420"/>
    <line x1="610" y1="80" x2="610" y2="420"/>
  </g>

  <!-- Arrows between subdomains (MPI comm) -->
  <g stroke="#5eead4" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M395 130 l-10 -8 m10 8 l-10 8" transform="translate(0,0)"/>
    <line x1="390" y1="130" x2="410" y2="130"/>
    <line x1="410" y1="180" x2="390" y2="180"/>
    <path d="M395 180 l10 -8 m-10 8 l10 8"/>

    <line x1="270" y1="245" x2="270" y2="265"/>
    <path d="M270 260 l-8 -8 m8 8 l8 -8"/>
    <line x1="530" y1="265" x2="530" y2="245"/>
    <path d="M530 250 l-8 8 m8 -8 l8 8"/>

    <line x1="390" y1="340" x2="410" y2="340"/>
    <path d="M395 340 l-8 -7 m8 7 l-8 7"/>
  </g>

  <g fill="#5eead4" opacity="0.6" font-family="ui-monospace, monospace" font-size="14">
    <text x="160" y="100">P0</text>
    <text x="420" y="100">P1</text>
    <text x="160" y="280">P2</text>
    <text x="420" y="280">P3</text>
  </g>
  <text x="40" y="470" font-family="ui-monospace, monospace" font-size="14" fill="#5eead4" opacity="0.6">MPI · OpenMP · domain decomposition</text>
</svg>
