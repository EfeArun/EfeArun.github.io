<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#1f2a3d"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg3)"/>

  <!-- Multiple sine waves at decreasing opacity, like time snapshots -->
  <g fill="none" stroke="#5eead4" stroke-width="1.6">
    <path d="M40 180 C140 100, 240 100, 340 180 S540 260, 640 180 S840 100, 940 180" stroke-opacity="0.85"/>
    <path d="M40 220 C140 150, 240 150, 340 220 S540 290, 640 220 S840 150, 940 220" stroke-opacity="0.55"/>
    <path d="M40 260 C140 200, 240 200, 340 260 S540 320, 640 260 S840 200, 940 260" stroke-opacity="0.35"/>
  </g>

  <!-- Bottom topography (varying) -->
  <path d="M40 460 L40 380 C120 360, 200 410, 280 390 S 440 350, 520 380 S 680 420, 760 390 L760 460 Z"
        fill="#5eead4" fill-opacity="0.12" stroke="#5eead4" stroke-opacity="0.6"/>

  <!-- Vertical sample lines -->
  <g stroke="#5eead4" stroke-opacity="0.25" stroke-dasharray="3,4">
    <line x1="160" y1="120" x2="160" y2="460"/>
    <line x1="320" y1="120" x2="320" y2="460"/>
    <line x1="480" y1="120" x2="480" y2="460"/>
    <line x1="640" y1="120" x2="640" y2="460"/>
  </g>

  <text x="40" y="470" font-family="ui-monospace, monospace" font-size="14" fill="#5eead4" opacity="0.6">1D PDE · forward-mode AD</text>
</svg>
